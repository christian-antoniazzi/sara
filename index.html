<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Official Checkout for Sara - Visual Direction & Content Strategy.">
    <title>Sara | Checkout</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
</head>
<body>
    <div class="background-mesh">
        <div class="mesh-orb orb-1"></div>
        <div class="mesh-orb orb-2"></div>
        <div class="mesh-orb orb-3"></div>
    </div>

    <nav>
        <div class="container nav-container animate-fade-up">
            <a href="#" class="logo">Sara</a>
            <a href="mailto:sara@example.com" class="nav-cta">
                Contact Sara
            </a>
        </div>
    </nav>

    <main class="page-center">
        <section id="checkout" class="checkout-section animate-fade-up">
            <div class="container">
                <div class="checkout-box">
                    <h2 class="checkout-title">Secure Your Booking</h2>
                    <p class="checkout-subtitle">Complete the form below to reserve your premium consultation slot with Sara.</p>
                    <form id="checkout-form">
                        <div class="form-group">
                            <label for="email">Email Address</label>
                            <input type="email" id="email" placeholder="you@example.com" required>
                        </div>
                        <div class="form-group">
                            <label>Service Selection</label>
                            <div class="stripe-element-placeholder">
                                Premium Consultation Slot - Reserved
                            </div>
                        </div>
                        <button type="submit" class="btn-checkout">Confirm Booking</button>
                    </form>
                    <div class="checkout-footer">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                        Secure, encrypted transaction
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Sara Studio. All rights reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
